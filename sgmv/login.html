<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGMV — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { display: block; }
    .login-page { display: flex; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .orb-1 { width: 350px; height: 350px; background: rgba(0,191,166,.12); top: -80px; right: -60px; }
    .orb-2 { width: 250px; height: 250px; background: rgba(0,191,166,.08); bottom: 40px; left: 20px; }
    .demo-hint { background: rgba(0,191,166,.12); border: 1px solid rgba(0,191,166,.3); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--teal); margin-bottom: 20px; text-align: center; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🚗</div>
      <div>
        <div class="login-logo-text">SGMV</div>
        <div class="login-logo-sub">Sistema de Gestión de Mantenimiento Vehicular</div>
      </div>
    </div>

    <h1 class="login-title">Bienvenido</h1>
    <p class="login-sub">Ingresa tus credenciales para acceder al sistema</p>

    <div class="demo-hint">🔑 Demo: usuario <strong>admin</strong> · contraseña <strong>1234</strong></div>

    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" class="form-control with-icon" id="username" placeholder="Tu nombre de usuario" value="admin">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" class="form-control with-icon" id="password" placeholder="••••••••" value="1234">
        </div>
        <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
      </div>

      <div id="error-msg" style="display:none;background:rgba(239,83,80,.1);border-radius:6px;padding:10px 14px;font-size:13px;color:var(--red);"></div>

      <button type="submit" class="btn btn-primary btn-lg w-full" style="justify-content:center;margin-top:4px;">
        Iniciar sesión →
      </button>
    </form>

    <div class="login-footer">¿Aún no tienes cuenta? <a href="#" style="color:var(--teal);font-weight:600;">Contacta al administrador</a></div>
  </div>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const err = document.getElementById('error-msg');
  if (u === 'admin' && p === '1234') {
    window.location.href = 'pages/dashboard.html';
  } else {
    err.style.display = 'block';
    err.textContent = '❌ Credenciales incorrectas. Usa admin / 1234 para el demo.';
  }
}
</script>
</body>
</html>
